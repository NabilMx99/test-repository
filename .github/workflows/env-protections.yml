name: Env Protections Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build App
        run: |
          echo "Building app..."
          sleep 10
          echo "Done."
        
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Deploy App
        run: |
          echo "Deploying app..."
          sleep 10
          echo "Done."
