name: GitHub Actions Artifacts

on:
  workflow_dispatch:

jobs:
  upload-file:
      runs-on: ubuntu-latest
      steps:
        - name: Create a file
          run: echo 'Hello World!' > hello-world.txt
        
        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: my-artifact
            path: hello-world.txt
            retention-days: 1
